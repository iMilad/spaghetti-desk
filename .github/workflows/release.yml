name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-assets:
    name: Build release assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.24"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --locked --all-extras --dev

      - name: Build backend package
        working-directory: backend
        run: uv build

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Package frontend
        run: tar -czf spaghetti-desk-frontend.tar.gz -C frontend/dist .

      - name: Verify Docker Hub configuration
        id: registry
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          case "$DOCKERHUB_USERNAME" in
            "")
              echo "::error::Set the DOCKERHUB_USERNAME repository variable."
              exit 1
              ;;
            *[!a-z0-9_-]*)
              echo "::error::DOCKERHUB_USERNAME must be a lowercase Docker Hub namespace."
              exit 1
              ;;
          esac
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Set the DOCKERHUB_TOKEN repository secret."
            exit 1
          fi
          echo "image_name=docker.io/$DOCKERHUB_USERNAME/spaghetti-desk" >> "$GITHUB_OUTPUT"

      - name: Resolve release version
        id: version
        run: |
          release_version=${GITHUB_REF_NAME#v}
          if ! printf '%s' "$release_version" \
            | grep --extended-regexp --quiet '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Release tags must use vX.Y.Z or vX.Y.Z-prerelease."
            exit 1
          fi
          echo "value=$release_version" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          scope: ${{ vars.DOCKERHUB_USERNAME }}/spaghetti-desk@push

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Generate container metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.registry.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push release image
        id: container
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.value }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Assemble release assets
        env:
          COMPOSE_ASSET: spaghetti-desk-${{ github.ref_name }}-compose.yaml
          ENV_ASSET: spaghetti-desk-${{ github.ref_name }}.env.example
          IMAGE_NAME: ${{ steps.registry.outputs.image_name }}
          IMAGE_DIGEST: ${{ steps.container.outputs.digest }}
        run: |
          mkdir release-assets
          cp backend/dist/*.whl backend/dist/*.tar.gz release-assets/
          cp spaghetti-desk-frontend.tar.gz release-assets/
          cp .github/release/env.example "release-assets/$ENV_ASSET"
          ./scripts/render-release-compose.sh \
            "$IMAGE_NAME@$IMAGE_DIGEST" \
            "release-assets/$COMPOSE_ASSET"
          cd release-assets
          sha256sum "$COMPOSE_ASSET" "$ENV_ASSET" > CONTAINER_SHA256SUMS
          sha256sum ./*.whl ./*.tar.gz ./*-compose.yaml ./*.env.example > SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: release-assets/*
