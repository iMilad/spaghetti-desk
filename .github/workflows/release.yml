name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version without a leading v, for example 0.3.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_TAG: v${{ inputs.version }}
    steps:
      - name: Checkout release source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate release request
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Releases must run from the main branch."
            exit 1
          fi
          if ! printf '%s' "$RELEASE_VERSION" \
            | grep --extended-regexp --quiet '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
            echo "::error::Version must use X.Y.Z or X.Y.Z-prerelease."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Tag $RELEASE_TAG already exists."
            exit 1
          fi

      - name: Verify Docker Hub configuration
        id: registry
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          case "$DOCKERHUB_USERNAME" in
            "")
              echo "::error::Set the DOCKERHUB_USERNAME repository variable."
              exit 1
              ;;
            *[!a-z0-9_-]*)
              echo "::error::DOCKERHUB_USERNAME must be a lowercase Docker Hub namespace."
              exit 1
              ;;
          esac
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Set the DOCKERHUB_TOKEN repository secret."
            exit 1
          fi
          echo "image_name=docker.io/$DOCKERHUB_USERNAME/spaghetti-desk" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          scope: ${{ vars.DOCKERHUB_USERNAME }}/spaghetti-desk@push

      - name: Generate container metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.registry.outputs.image_name }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ !contains(env.RELEASE_VERSION, '-') }}

      - name: Build and push release image
        id: container
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            APP_VERSION=${{ env.RELEASE_VERSION }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Assemble release assets
        env:
          COMPOSE_ASSET: spaghetti-desk-${{ env.RELEASE_TAG }}-compose.yaml
          ENV_ASSET: spaghetti-desk-${{ env.RELEASE_TAG }}.env.example
          IMAGE_NAME: ${{ steps.registry.outputs.image_name }}
          IMAGE_DIGEST: ${{ steps.container.outputs.digest }}
        run: |
          mkdir release-assets
          cp .github/release/env.example "release-assets/$ENV_ASSET"
          ./scripts/render-release-compose.sh \
            "$IMAGE_NAME@$IMAGE_DIGEST" \
            "release-assets/$COMPOSE_ASSET"
          cd release-assets
          sha256sum "$COMPOSE_ASSET" "$ENV_ASSET" > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          fail_on_unmatched_files: true
          files: release-assets/*
          generate_release_notes: true
          name: Spaghetti Desk ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
