name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # The public release build is tag-driven in release.yml. Automatic
          # release PRs need the repository setting that allows GitHub Actions
          # to create pull requests, or a configured release token.
          skip-github-pull-request: true
