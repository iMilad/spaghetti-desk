# Public-safe template for a private deployment override.
# scripts/install-local.py copies this to the platform user config directory.
# Docker Compose mounts the dedicated private directory for the Settings writer.
# Never commit the private copy.

operator:
  id: local-operator
  display_name: Local Operator
  role: admin

collectors:
  enabled: false
  # Keep this false for the first connectivity check.
  write_to_local_inventory: false
  plugins:
    jenkins:
      enabled: false
      interval_seconds: 300
      # Environment references such as ${JENKINS_URL} are not expanded here.
      # The Settings page writes the real non-secret URL to private config.yaml.
      base_url: https://jenkins.example.invalid
      username_env: JENKINS_USERNAME
      token_env: JENKINS_TOKEN
      job_include_patterns: []
      default_owner_team: Unassigned
      timeout_seconds: 10
      verify_tls: true

actions:
  enabled: false
  require_approval_by_default: true
  audit_all_attempts: true
