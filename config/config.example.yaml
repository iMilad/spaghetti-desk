app:
  name: Spaghetti Desk
  environment: development
  public_base_url: http://localhost:5173

ui:
  preferences:
    overview_widget_storage_key: spaghetti-desk.overview-widgets.v1
  modules:
    services:
      id: services
      label: Services
      enabled: true
      show_in_overview: true
      description: Service catalog, ownership, maintenance, monitoring, and risk state.
    pipelines:
      id: pipelines
      label: Pipelines
      enabled: true
      show_in_overview: true
      description: CI/CD pipeline catalog, ownership, status, and last-run state.
    vms:
      id: vms
      label: VMs
      enabled: true
      show_in_overview: true
      description: VM ownership, freshness, patch status, and review workflows.
    licenses:
      id: licenses
      label: Licenses
      enabled: true
      show_in_overview: true
      description: License, support, certificate, token, and renewal visibility.
    permissions:
      id: permissions
      label: Permissions
      enabled: true
      show_in_overview: false
      description: Permission drift, stale accounts, admin users, and audit risk.
    agents:
      id: agents
      label: Agents
      enabled: true
      show_in_overview: true
      description: Agent sessions, approvals, commands, outcomes, and review state.
  navigation_items:
    - id: overview
      label: Overview
    - id: services
      label: Services
      module_id: services
    - id: pipelines
      label: Pipelines
      module_id: pipelines
    - id: vms
      label: VMs
      module_id: vms
    - id: licenses
      label: Licenses
      module_id: licenses
    - id: permissions
      label: Permissions
      module_id: permissions
    - id: agents
      label: Agents
      module_id: agents
    - id: collectors
      label: Collectors
  overview_widgets:
    - id: runtime-model
      label: Runtime model
      default_visible: true
    - id: service-health
      label: Services snapshot
      module_id: services
      default_visible: true
    - id: vm-ownership
      label: VM ownership
      module_id: vms
      default_visible: true
    - id: license-renewals
      label: License renewals
      module_id: licenses
      default_visible: true
    - id: permission-risk
      label: Permission risk
      module_id: permissions
      default_visible: false
    - id: agent-activity
      label: Agent activity
      module_id: agents
      default_visible: true

database:
  url: postgresql+psycopg://spaghetti:spaghetti@postgres:5432/spaghetti
  pool_size: 5
  max_overflow: 10

api:
  default_page_size: 50
  max_page_size: 100

collectors:
  enabled: false
  default_interval_seconds: 300
  write_to_local_inventory: true
  plugins:
    jenkins:
      enabled: false
      interval_seconds: 300
      base_url: https://jenkins.example.invalid
      username_env: JENKINS_USERNAME
      token_env: JENKINS_TOKEN
      job_include_patterns: []
      default_owner_team: Unassigned
      timeout_seconds: 10
      verify_tls: true

actions:
  enabled: false
  require_approval_by_default: true
  audit_all_attempts: true

integrations:
  - name: demo-issue-tracker
    type: issue-tracker
    enabled: false
    base_url: https://issues.example.invalid
    auth_env_var: SPAGHETTI_DEMO_ISSUE_TRACKER_TOKEN
  - name: demo-ci
    type: ci
    enabled: false
    base_url: https://ci.example.invalid
    auth_env_var: SPAGHETTI_DEMO_CI_TOKEN
  - name: demo-vm-platform
    type: vm-platform
    enabled: false
    base_url: https://vms.example.invalid
    auth_env_var: SPAGHETTI_DEMO_VM_PLATFORM_TOKEN
