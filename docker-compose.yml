services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spaghetti
      POSTGRES_USER: spaghetti
      POSTGRES_PASSWORD: spaghetti
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spaghetti -d spaghetti"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SPAGHETTI_ENV: development
      SPAGHETTI_CONFIG_PATH: /app/config/config.yaml
      SPAGHETTI_DEMO_DATA_DIR: /app/examples/demo-data
      SPAGHETTI_DATABASE_URL: postgresql+psycopg://spaghetti:spaghetti@postgres:5432/spaghetti
      JENKINS_USERNAME: ${JENKINS_USERNAME:-}
      JENKINS_TOKEN: ${JENKINS_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - type: bind
        source: ${SPAGHETTI_CONFIG_HOST_PATH:-./config/config.example.yaml}
        target: /app/config/config.yaml
        read_only: true
      - ./examples:/app/examples:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SPAGHETTI_DATABASE_URL: postgresql+psycopg://spaghetti:spaghetti@postgres:5432/spaghetti
    command: ["uv", "run", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
