services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spaghetti
      POSTGRES_USER: spaghetti
      POSTGRES_PASSWORD: spaghetti
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spaghetti -d spaghetti"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SPAGHETTI_ENV: development
      SPAGHETTI_CONFIG_PATH: /app/config/config.example.yaml
      SPAGHETTI_DEMO_DATA_DIR: /app/examples/demo-data
      SPAGHETTI_DATABASE_URL: postgresql+psycopg://spaghetti:spaghetti@postgres:5432/spaghetti
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./examples:/app/examples:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
